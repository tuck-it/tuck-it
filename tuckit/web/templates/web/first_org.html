<!doctype html>
<html lang="en">
{% include "registration/_auth_head.html" with page_title="Create your organization" %}
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">tuckit</div>
      <h1 class="auth-title">Create your first organization</h1>
      <p class="auth-sub">Your account isn’t part of an organization yet. Create one to get a workspace and start.</p>
      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="auth-field">
          <label for="org-name">Organization name</label>
          <input id="org-name" name="name" value="{{ values.name }}" autocomplete="organization" required autofocus>
        </div>
        <button type="submit" class="button button-primary">Create organization</button>
      </form>
    </div>
  </main>
</body>
</html>
