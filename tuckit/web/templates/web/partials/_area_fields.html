{% load web_extras %}
{% comment %}Shared Area create/edit fields. Caller owns the <form>, action and
submit button. Pass `area` to prefill (edit). Description is collapsed until
requested, and auto-expanded when the area already has one.{% endcomment %}
<input name="name" class="af-name" value="{{ area.name|default:'' }}" x-ref="nameInput"
       placeholder="e.g. Backend" maxlength="200" required autocomplete="off">
<div class="af-desc" x-data="{show: {% if area.description %}true{% else %}false{% endif %}}">
  <button type="button" class="ghost af-desc-toggle" x-show="!show" x-on:click="show = true">＋ Add description</button>
  <textarea name="description" class="af-desc-input" rows="2" x-show="show" x-cloak
            placeholder="What is this area for? (optional)">{{ area.description|default:'' }}</textarea>
</div>
