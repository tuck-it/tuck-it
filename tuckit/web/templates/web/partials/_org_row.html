<div class="org-card" data-org-id="{{ row.org.id }}">
  <div class="org-card-head">
    <a class="org-card-name" href="{% url 'web:home' row.org.slug %}">{{ row.org.name }}</a>
    <span class="role-badge role-badge--{{ row.role }}">{{ row.role }}</span>
    {% if row.is_current %}<span class="org-card-meta">· current</span>{% endif %}
    <a class="org-card-open" href="{% url 'web:home' row.org.slug %}">Org home →</a>
  </div>
  {% if row.can_leave %}
  <div class="org-card-foot">
    <form hx-post="{% url 'web:account_org_leave' nav_org.slug row.org.id %}" hx-confirm="Leave {{ row.org.name }}?">
      <button type="submit" class="btn danger">Leave</button>
    </form>
  </div>
  {% endif %}
</div>
