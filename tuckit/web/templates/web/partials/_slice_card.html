{% load web_extras %}
<div class="slice-card" data-slice-id="{{ slice.id }}"
     hx-get="{% wurl 'web:slice' slice.id %}?panel=1" hx-target="#panel" hx-push-url="{% slice_push_url slice.id %}">
  {% if show_area %}<span class="card-area">{{ slice.area.name }}</span>{% endif %}
  <div class="card-title">{{ slice.title }}</div>
  <div class="card-meta">
    {% include "web/partials/_tag_text.html" %}
    <span class="card-bites">{% bite_progress slice %}</span>
  </div>
</div>
