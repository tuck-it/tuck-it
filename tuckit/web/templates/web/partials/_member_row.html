<tr id="member-{{ m.id }}">
  <td>
    <div class="member-cell">
      <span class="avatar">{{ m.user.email|slice:":1"|upper }}</span>
      <div><div class="nm">{{ m.user.email }}</div>{% if m.user == request.user %}<div class="sub">You</div>{% endif %}</div>
    </div>
  </td>
  <td>
    {% if can_owner and m.user != request.user %}
      <span class="settings-select"><select hx-post="{% url 'web:org_member_role' org.slug m.id %}"
              hx-target="#member-{{ m.id }}" hx-swap="outerHTML" name="role">
        {% for value, label in role_choices %}
          <option value="{{ value }}" {% if m.role == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select></span>
    {% else %}
      <span class="role-badge role-badge--{{ m.role }}">{{ m.get_role_display }}</span>
    {% endif %}
  </td>
  <td><span class="status-pill status-pill--active">Active</span></td>
  <td class="member-table-actions">
    {% if can_admin and m.role != 'owner' and m.user != request.user %}
      <button class="btn" hx-post="{% url 'web:org_member_remove' org.slug m.id %}"
              hx-target="#member-{{ m.id }}" hx-swap="outerHTML" hx-confirm="Remove this member?">Remove</button>
    {% endif %}
  </td>
</tr>
