{% load web_extras %}
<aside class="settings-nav">
  <a class="settings-back" href="{% url 'web:home' nav_org.slug %}">{% icon "chevron" "icon settings-back-chev" %}<span>Back to app</span></a>

  <div class="settings-grp">Account</div>
  <a class="settings-item{% if settings_active == 'account_profile' %} on{% endif %}" href="{% url 'web:settings_account_profile' nav_org.slug %}">Profile</a>
  <a class="settings-item{% if settings_active == 'account_orgs' %} on{% endif %}" href="{% url 'web:settings_account_orgs' nav_org.slug %}">Your organizations</a>

  <div class="settings-grp">Organization<span class="settings-scope">{{ nav_org.name }}</span></div>
  <a class="settings-item{% if settings_active == 'org_general' %} on{% endif %}" href="{% url 'web:settings_org_general' nav_org.slug %}">General</a>
  <a class="settings-item{% if settings_active == 'org_members' %} on{% endif %}" href="{% url 'web:settings_org_members' nav_org.slug %}">Members</a>
  <a class="settings-item{% if settings_active == 'org_agent' %} on{% endif %}" href="{% url 'web:settings_org_agent' nav_org.slug %}">Agent</a>
  <a class="settings-item{% if settings_active == 'org_shipped' %} on{% endif %}" href="{% url 'web:settings_org_shipped' nav_org.slug %}">Shipped board</a>
  {% if can_owner %}<a class="settings-item danger{% if settings_active == 'org_danger' %} on{% endif %}" href="{% url 'web:settings_org_danger' nav_org.slug %}">Danger zone</a>{% endif %}
</aside>
