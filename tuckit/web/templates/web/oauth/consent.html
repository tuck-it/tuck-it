{# tuckit/tuckit/web/templates/web/oauth/consent.html #}
{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorize {{ client.name|default:"an app" }} · tuckit</title>
  <link rel="stylesheet" href="{% static 'web/tokens.brand.css' %}">
  <link rel="stylesheet" href="{% static 'web/tokens.product.css' %}">
  <link rel="stylesheet" href="{% static 'web/base.css' %}">
  <link rel="stylesheet" href="{% static 'web/app.css' %}">
  <style>
    .oauth-wrap { min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
    .oauth-card { width: 100%; max-width: 420px; border: 1px solid var(--line);
      border-radius: var(--radius); background: var(--paper); padding: 28px; }
    .oauth-card h1 { font-size: 1.15rem; margin: 0 0 6px; }
    .oauth-card p { color: var(--muted); margin: 0 0 18px; }
    .oauth-field { display: block; margin: 0 0 18px; }
    .oauth-field select { width: 100%; }
    .oauth-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .oauth-scope { font-size: .85rem; color: var(--muted); margin: 0 0 18px; }
  </style>
</head>
<body>
  <div class="oauth-wrap">
    <form class="oauth-card" method="post" action="{% url 'web:oauth_authorize' %}">
      {% csrf_token %}
      <h1>Authorize {{ client.name|default:"this app" }}</h1>
      <p>It wants to read and write your tuckit Areas, Slices, Plans, and Bites over MCP.</p>

      <label class="oauth-field">
        <span>Workspace</span>
        <select name="org_id" required>
          {% for o in orgs %}<option value="{{ o.id }}">{{ o.name }}</option>{% endfor %}
        </select>
      </label>

      <input type="hidden" name="response_type" value="{{ response_type }}">
      <input type="hidden" name="client_id" value="{{ client.client_id }}">
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
      <input type="hidden" name="state" value="{{ state }}">
      <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
      <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">
      <input type="hidden" name="scope" value="{{ scope }}">

      <div class="oauth-actions">
        <a class="button" href="{{ redirect_uri }}?error=access_denied{% if state %}&state={{ state|urlencode }}{% endif %}">Cancel</a>
        <button type="submit" class="button button-primary">Allow</button>
      </div>
    </form>
  </div>
</body>
</html>
