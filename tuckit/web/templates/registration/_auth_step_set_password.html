<h1 class="auth-title">Create your account</h1>
<p class="auth-sub">Set a password to finish signing up.</p>
<div class="auth-id"><span>{{ email }}</span><a class="auth-id-edit" href="{% url 'web:login' %}">Edit</a></div>
{% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
<form method="post" class="auth-form">
  {% csrf_token %}
  <input type="hidden" name="step" value="register">
  <input type="hidden" name="email" value="{{ email }}">
  {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
  <div class="auth-field">
    <label for="id-newpw">Password</label>
    <input id="id-newpw" type="password" name="password" autocomplete="new-password" required autofocus>
    <small class="field-hint">At least 8 characters.</small>
  </div>
  <button type="submit" class="button button-primary">Continue</button>
</form>
