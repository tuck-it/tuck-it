<h1 class="auth-title">Welcome back</h1>
<p class="auth-sub">Enter your password to continue.</p>
<div class="auth-id"><span>{{ email }}</span><a class="auth-id-edit" href="{% url 'web:login' %}">Edit</a></div>
{% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
<form method="post" class="auth-form">
  {% csrf_token %}
  <input type="hidden" name="step" value="login">
  <input type="hidden" name="email" value="{{ email }}">
  {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
  <div class="auth-field">
    <label for="id-pw">Password</label>
    <input id="id-pw" type="password" name="password" autocomplete="current-password" required autofocus>
  </div>
  <button type="submit" class="button button-primary">Log in</button>
</form>
