[pytest]
DJANGO_SETTINGS_MODULE = tuckit.settings_test
python_files = tests.py test_*.py *_tests.py
asyncio_mode = auto
# pytest-django forces settings.DEBUG = False during the test session by
# default (django_test_environment fixture), overriding the DEBUG=1 set by
# tuckit/settings_test.py. "keep" preserves whatever the settings module
# computed, which is what our DEBUG-gated static storage relies on.
django_debug_mode = keep
